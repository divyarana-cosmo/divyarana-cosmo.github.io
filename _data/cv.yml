          - "Analyzing large photometric and spectroscopic survey data for cosmological inference."
          - "Supervisor: Prof. Dr. Henk Hoekstra."
      - company: "Euclid Mission"
        position: "Key Project Coordinator (Data Release 1)"
        start_date: "2025-01"
        end_date: "present"
        highlights:
          - "Coordinating cross–working–group efforts for Euclid DR1 galaxy–galaxy lensing science products."
          - "Managing timelines, milestones, and communication across multiple institutes."
          - "Acting as liaison between science working groups and Euclid Consortium management."
      - company: "Inter-University Centre for Astronomy and Astrophysics (IUCAA)"
