  sections:
    summary:
      - "Postdoctoral researcher in observational cosmology specializing in large-scale structure, galaxy–halo connections, and weak gravitational lensing. Key Project Coordinator for the Euclid Mission DR1 with experience leading international collaborations and developing precision cosmology analyses."
    employment:
      - company: "Leiden Observatory, Leiden University"
        position: "Postdoctoral Researcher"
        location: "The Netherlands"
        start_date: "2023-10"
